<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Sohit Sharma</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --text-color: #1f2937;
            --text-secondary: #6b7280;
            --error-color: #ef4444;
            --success-color: #10b981;
        }
        
        body.light-theme {
            --primary-color: #6366f1;
            --text-color: #1f2937;
            --text-secondary: #6b7280;
        }
        
        body.dark-theme {
            --primary-color: #818cf8;
            --text-color: #f1f5f9;
            --text-secondary: #94a3b8;
        }
        
        .thanks-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        
        .thanks-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .gradient-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }
        
        .gradient-sphere:nth-child(1) {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }
        
        .gradient-sphere:nth-child(2) {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            bottom: -200px;
            right: -200px;
            animation-delay: 2s;
        }
        
        .gradient-sphere:nth-child(3) {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 4s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        
        .thanks-content {
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.8s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s ease-out 0.3s both;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }
        
        .success-icon i {
            font-size: 2.5rem;
            color: white;
        }
        
        .thanks-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 1rem;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }
        
        .thanks-message {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
            animation: fadeIn 0.8s ease-out 0.7s both;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .thanks-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 0.8s ease-out 0.9s both;
        }
        
        .btn {
            padding: 0.875rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }
        
        .btn-secondary:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }
        
        .contact-info {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.8s ease-out 1.1s both;
        }
        
        .contact-info p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .social-link:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }
        
        /* Dark theme support */
        body.dark-theme {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        
        body.dark-theme .thanks-content {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        body.dark-theme .thanks-title {
            color: #f1f5f9;
        }
        
        body.dark-theme .thanks-message {
            color: #94a3b8;
        }
        
        body.dark-theme .contact-info {
            border-top-color: rgba(255, 255, 255, 0.1);
        }
        
        body.dark-theme .contact-info p {
            color: #94a3b8;
        }
        
        body.dark-theme .social-link {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
        }
        
        body.dark-theme .social-link:hover {
            background: #6366f1;
            color: white;
        }
        
        body.dark-theme .btn-secondary {
            color: #a5b4fc;
            border-color: #6366f1;
        }
        
        body.dark-theme .btn-secondary:hover {
            background: #6366f1;
            color: white;
        }
        
        /* Dark theme gradient spheres */
        body.dark-theme .gradient-sphere:nth-child(1) {
            background: linear-gradient(135deg, #4c1d95 0%, #5b21b6 100%);
        }
        
        body.dark-theme .gradient-sphere:nth-child(2) {
            background: linear-gradient(135deg, #701a75 0%, #881337 100%);
        }
        
        body.dark-theme .gradient-sphere:nth-child(3) {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            .thanks-content {
                padding: 2rem;
                margin: 1rem;
            }
            
            .thanks-title {
                font-size: 2rem;
            }
            
            .thanks-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="thanks-container">
        <div class="thanks-background">
            <div class="gradient-sphere"></div>
            <div class="gradient-sphere"></div>
            <div class="gradient-sphere"></div>
        </div>
        
        <div class="thanks-content">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            
            <h1 class="thanks-title">Thank You!</h1>
            
            <p class="thanks-message">
                Your message has been successfully sent. I really appreciate you taking the time to reach out. 
                I'll get back to you as soon as possible and look forward to connecting with you!
            </p>
            
            <div class="thanks-buttons">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> Back to Portfolio
                </a>
                <a href="index.html#contact" class="btn btn-secondary">
                    <i class="fas fa-envelope"></i> Send Another Message
                </a>
            </div>
            
            <div class="contact-info">
                <p>While you wait, feel free to connect with me on social media:</p>
                <div class="social-links">
                    <a href="https://github.com/Sohit-Sharma" target="_blank" class="social-link" aria-label="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="https://www.linkedin.com/in/sohit-sharma-940084172/" target="_blank" class="social-link" aria-label="LinkedIn">
                        <i class="fab fa-linkedin"></i>
                    </a>
                    <a href="mailto:sohitsharma922@gmail.com" class="social-link" aria-label="Email">
                        <i class="fas fa-envelope"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Theme support
        function initializeTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
            }
        }
        
        // Auto-redirect after 10 seconds (optional)
        function initAutoRedirect() {
            setTimeout(() => {
                const redirect = confirm('Would you like to return to the main portfolio page?');
                if (redirect) {
                    window.location.href = 'index.html';
                }
            }, 10000);
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initializeTheme();
            // Uncomment the next line if you want auto-redirect
            // initAutoRedirect();
        });
        
        // Add some interactive effects
        document.querySelectorAll('.btn, .social-link').forEach(element => {
            element.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-2px) scale(1.05)';
            });
            
            element.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0) scale(1)';
            });
        });
    </script>
</body>
</html>
